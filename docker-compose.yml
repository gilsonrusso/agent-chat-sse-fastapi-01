services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_chat_postgres
    restart: always
    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_password
      POSTGRES_DB: agent_chat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: agent_chat_adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  postgres_data:
